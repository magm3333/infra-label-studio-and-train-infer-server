services:
  label-studio:
    image: heartexlabs/label-studio:1.23.0
    restart: always
    container_name: label-studio
    user: "1000"
    environment:
      - TZ=America/Argentina/Buenos_Aires
      - DEBUG=True
      - CSRF_TRUSTED_ORIGINS=https://labelstudio.brunoschillig.com
    volumes:
      - ./mydata:/label-studio/data:rw
    ports:
      - 10000:8080

  yolo11-backend:
    image: yolo11-label-studio-backend:latest
    command: ["gunicorn", "--bind", "0.0.0.0:9090", "--timeout", "600", "--access-logfile", "-", "app:app"]
    gpus: all
    shm_size: 4gb
    restart: always
    container_name: yolo11-backend
    environment:
      - TZ=America/Argentina/Buenos_Aires
      - MODEL_PATH=/models/precintos-s.pt
      - TRAIN_MODEL_PATH=/models/precintos-s.pt
      - LABEL_STUDIO_URL=http://label-studio:8080
      - LABEL_STUDIO_API_KEY=${LABEL_STUDIO_API_KEY:-}
      - LABEL_STUDIO_AUTH_SCHEME=Bearer
      - LABEL_STUDIO_JWT_USER_ID=1
      - CONFIDENCE_THRESHOLD=0.25
      - TRAIN_EPOCHS=50
      - TRAIN_IMGSZ=640
      - TRAIN_BATCH=8
      - TRAIN_PATIENCE=20
      - TRAIN_WORKERS=2
      - TRAIN_DEVICE=auto
      - MODEL_HUB_KEY_FILE=/run/secrets/model_hub_key.txt
      - MODEL_HUB_GH_TOKEN=${MODEL_HUB_GH_TOKEN:-}
      - MODEL_HUB_REPO=${MODEL_HUB_REPO:-OneclickEB/models-hub}
      - YOLO_TRAINER_JWT_SECRET=${YOLO_TRAINER_JWT_SECRET:-}
    volumes:
      # Codigo fuente mudado a /m2data/proyectos/yolo-trainer (ver contexto_proyecto.txt);
      # este compose y mydata/ se quedan en infra-label-studio, Label Studio no se mueve.
      - /m2data/proyectos/yolo-trainer/app.py:/app/app.py:ro
      - /m2data/proyectos/yolo-trainer/auth.py:/app/auth.py:ro
      - /m2data/proyectos/yolo-trainer/telegram_notifier.py:/app/telegram_notifier.py:ro
      - /m2data/proyectos/yolo-trainer/model_hub:/app/model_hub:ro
      - /m2data/proyectos/yolo-trainer/VERSION:/app/VERSION:ro
      - ./mydata:/label-studio/data:rw
      - ./mydata/yolo-backend:/app/data:rw
      - /m2data/proyectos/neural-vision/infra/nv-client1/models:/models:rw
      # Misma clave que usa ai-ocr-2026/ocr-labeling — un único Model Hub,
      # una única passphrase para todo lo publicado (ver plan-model-hub.md).
      - /m2data/proyectos/ai-ocr-2026/componentes/tools/ocr-labeling/secrets/model_hub_key.txt:/run/secrets/model_hub_key.txt:ro
    ports:
      - 9090:9090
    depends_on:
      - label-studio
    networks:
      default:
        aliases:
          - yolo11-backend.local
          
